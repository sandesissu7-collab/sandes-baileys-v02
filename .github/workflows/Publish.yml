name: 📦 Upload
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches:
      - master
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 🧾 Checkout code
        uses: actions/checkout@v4
      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com/
      - name: 📦 Install dependencies (retry up to 3x)
        run: |
          for i in 1 2 3; do npm ci && break || (echo "Retrying npm ci ($i)..." && sleep 10) done
      - name: 🏗️ Build package
        run: npm run build --if-present
      - name: 🚀 Publish to GitHub Packages (retry up to 3x)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for i in 1 2 3; do npm publish && break || (echo "Retrying publish ($i)..." && sleep 15) done
